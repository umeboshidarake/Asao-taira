<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER INVEST X</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050510;
color:#00f5ff;
text-align:center;
overflow-x:hidden;
}
canvas#particles{
position:fixed;
top:0;left:0;
z-index:-1;
}
h1{
text-shadow:0 0 10px #00f5ff,0 0 20px #00f5ff;
}
.card{
background:rgba(0,0,40,0.8);
border:1px solid #00f5ff;
box-shadow:0 0 15px #00f5ff55;
padding:12px;
margin:10px;
border-radius:12px;
}
button{
margin:4px;
padding:6px 12px;
background:transparent;
border:1px solid #00f5ff;
color:#00f5ff;
cursor:pointer;
}
button:hover{
background:#00f5ff;
color:#000;
}
.locked{opacity:0.4;}
@media(max-width:600px){
h1{font-size:22px;}
}
.tooltip{
font-size:12px;
color:#aaa;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="login">
<h1>CYBER INVEST X</h1>
<input id="nick" placeholder="ニックネーム">
<br><br>
<button onclick="startGame()">START</button>
</div>

<div id="game" style="display:none">

<h1>CYBER INVEST X</h1>
<p>👤 <span id="name"></span></p>
<p>💰 <span id="points"></span></p>
<p>📰 <span id="news"></span></p>
<p>⏳ 次の変動まで: <span id="timer"></span></p>

<div id="stocks"></div>

<h2>📈 Market Graph</h2>
<canvas id="chart"></canvas>

<h2>🛍 Background Shop</h2>
<button onclick="upgradeBG()">背景進化 (50000)</button>

<br><br>
<button onclick="toggleBGM()">🎵 BGM</button>
<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bce59.mp3?filename=future-technology-ambient-110624.mp3">
</audio>

</div>

<script>
const CHANGE_INTERVAL=3600000;
let points=50000;
let stocks;
let nextChange;
let chart;

const stockBase=[
{name:"TechNova",unlockCost:0,personality:"growth",flavor:"急成長テック企業"},
{name:"GreenVolt",unlockCost:15000,personality:"stable",flavor:"再エネの安定株"},
{name:"GameSphere",unlockCost:20000,personality:"volatile",flavor:"爆発的人気ゲーム会社"},
{name:"AICore",unlockCost:30000,personality:"growth",flavor:"AIの未来を握る"},
{name:"FoodChain",unlockCost:40000,personality:"stable",flavor:"生活必需の守護者"},
{name:"AutoDrive",unlockCost:50000,personality:"stable",flavor:"自動運転革命"},
{name:"SpaceXion",unlockCost:80000,personality:"risky",flavor:"宇宙開発の夢"},
{name:"MediLife",unlockCost:100000,personality:"growth",flavor:"医療革新企業"},
{name:"CryptoZen",unlockCost:150000,personality:"volatile",flavor:"仮想通貨の象徴"},
{name:"MediaStorm",unlockCost:200000,personality:"risky",flavor:"世界を動かす報道機関"}
];

function initStocks(){
stocks=stockBase.map(s=>({
...s,
price:Math.floor(Math.random()*100)+50,
owned:0,
lockedShares:0,
unlocked:s.unlockCost===0,
history:[]
}));
}

function startGame(){
let nick=document.getElementById("nick").value;
if(!nick)return;
localStorage.setItem("nickname",nick);

if(!localStorage.getItem("save")){
initStocks();
nextChange=Date.now()+CHANGE_INTERVAL;
save();
}else load();

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";
document.getElementById("name").innerText=localStorage.getItem("nickname");

processOffline();
render();
createChart();
timerLoop();
}

function save(){
localStorage.setItem("save",JSON.stringify({points,stocks,nextChange}));
}
function load(){
let d=JSON.parse(localStorage.getItem("save"));
points=d.points;stocks=d.stocks;nextChange=d.nextChange;
}
function processOffline(){
while(Date.now()>=nextChange){
marketUpdate();
nextChange+=CHANGE_INTERVAL;
}
}

function trade(i,amount){
let s=stocks[i];
if(!s.unlocked)return;
if(amount>0){
let cost=s.price*amount;
if(points>=cost){
points-=cost;
s.owned+=amount;
s.lockedShares+=amount;
}
}else{
let sell=Math.abs(amount);
if(sell>s.owned-s.lockedShares){alert("まだ売れない");return;}
points+=s.price*sell;
s.owned-=sell;
}
save();render();
}

function unlock(i){
let s=stocks[i];
if(points>=s.unlockCost){
points-=s.unlockCost;
s.unlocked=true;
save();render();
}
}

function render(){
document.getElementById("points").innerText=points;
let area=document.getElementById("stocks");
area.innerHTML="";
stocks.forEach((s,i)=>{
if(!s.unlocked){
area.innerHTML+=`
<div class="card locked">
${s.name}<br>
解禁:${s.unlockCost}<br>
<button onclick="unlock(${i})">解禁</button>
</div>`;
}else{
area.innerHTML+=`
<div class="card">
<b title="${s.flavor}">${s.name}</b><br>
価格:${s.price}<br>
保有:${s.owned}<br>
<button onclick="trade(${i},1)">+1</button>
<button onclick="trade(${i},10)">+10</button>
<button onclick="trade(${i},100)">+100</button><br>
<button onclick="trade(${i},-1)">-1</button>
<button onclick="trade(${i},-10)">-10</button>
<button onclick="trade(${i},-100)">-100</button>
</div>`;
}
});
}

function marketUpdate(){
stocks.forEach(s=>{
let change=Math.floor(Math.random()*20)-10;
if(s.personality==="growth")change+=5;
if(s.personality==="volatile")change*=2;
if(s.personality==="risky")change*=3;
s.price+=change;
if(s.price<10)s.price=10;
s.history.push(s.price);
s.lockedShares=0;
});
save();
updateChart();
}

function timerLoop(){
setInterval(()=>{
if(Date.now()>=nextChange){
marketUpdate();
nextChange=Date.now()+CHANGE_INTERVAL;
}
let remain=nextChange-Date.now();
let m=Math.floor(remain/60000);
let s=Math.floor((remain%60000)/1000);
document.getElementById("timer").innerText=m+"分 "+s+"秒";
},1000);
}

function createChart(){
chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:[],datasets:[]}
});
updateChart();
}
function updateChart(){
chart.data.labels=stocks[0].history.map((_,i)=>i);
chart.data.datasets=stocks.map(s=>({label:s.name,data:s.history,borderColor:"#00f5ff",tension:0.3}));
chart.update();
}

function upgradeBG(){
if(points>=50000){
points-=50000;
document.body.style.background="linear-gradient(45deg,#000,#001f3f,#003366)";
save();render();
}
}

function toggleBGM(){
let bgm=document.getElementById("bgm");
bgm.paused?bgm.play():bgm.pause();
}

/* 粒子 */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let parts=[];
for(let i=0;i<100;i++){
parts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5),dy:(Math.random()-0.5)});
}
function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);
parts.forEach(p=>{
p.x+=p.dx;p.y+=p.dy;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00f5ff";
ctx.shadowBlur=10;
ctx.shadowColor="#00f5ff";
ctx.fill();
});
requestAnimationFrame(anim);
}
anim();
</script>
</body>
</html>
