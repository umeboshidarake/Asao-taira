<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER STOCK 2099</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:#050510;
    color:#00f5ff;
    text-align:center;
    overflow-x:hidden;
}

#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(45deg,#001f3f,#0a0a2a,#001a33,#000814);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    z-index:-3;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    font-size:42px;
    text-shadow:0 0 10px #00f5ff,
                0 0 20px #00f5ff,
                0 0 40px #0088ff;
}

.card{
    background:rgba(0,0,30,0.8);
    border:1px solid #00f5ff;
    box-shadow:0 0 15px #00f5ff55;
    padding:15px;
    margin:12px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    box-shadow:0 0 25px #00f5ffaa;
}

button{
    padding:6px 12px;
    margin:4px;
    border-radius:6px;
    border:1px solid #00f5ff;
    background:transparent;
    color:#00f5ff;
    cursor:pointer;
}

button:hover{
    background:#00f5ff;
    color:#000;
    box-shadow:0 0 10px #00f5ff;
}

.locked{
    opacity:0.4;
}

.flavor{
    font-size:13px;
    color:#66ffff;
    min-height:18px;
}

canvas{
    background:rgba(0,0,30,0.7);
    border:1px solid #00f5ff;
    border-radius:10px;
    box-shadow:0 0 15px #00f5ff55;
}

@media(max-width:600px){
    h1{font-size:28px;}
    canvas{width:100%!important;height:250px!important;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>CYBER STOCK 2099</h1>

<div>
💰 ポイント: <span id="points">50000</span><br>
📰 ニュース: <span id="news">市場待機中</span><br>
⏳ 次の変動まで: <span id="timer">--</span>
</div>

<div id="stocksArea"></div>

<h2>📈 市場グラフ</h2>
<canvas id="chart"></canvas>

<br>
<button onclick="toggleBGM()">🎵 BGM ON/OFF</button>

<audio id="bgm" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bce59.mp3?filename=future-technology-ambient-110624.mp3" type="audio/mpeg">
</audio>

<script>
let points=50000;
let chart;
let nextChangeTime;
const CHANGE_INTERVAL=3600000;

const stockConfig=[
{name:"Tech",unlockCost:0,personality:"growth",flavor:"未来を切り開く革新企業。"},
{name:"Energy",unlockCost:0,personality:"stable",flavor:"安定供給の巨人。"},
{name:"Game",unlockCost:0,personality:"volatile",flavor:"ヒット次第で爆上がり。"},
{name:"AI",unlockCost:15000,personality:"growth",flavor:"急成長AI市場。"},
{name:"Food",unlockCost:20000,personality:"stable",flavor:"不況に強い。"},
{name:"Auto",unlockCost:30000,personality:"stable",flavor:"伝統と革新。"},
{name:"Space",unlockCost:50000,personality:"risky",flavor:"夢と暴落。"},
{name:"Medical",unlockCost:80000,personality:"growth",flavor:"医療革命。"},
{name:"Crypto",unlockCost:120000,personality:"volatile",flavor:"乱高下の王。"},
{name:"Media",unlockCost:200000,personality:"risky",flavor:"流行で爆発。"}
];

let stocks=stockConfig.map(s=>({
...s,
price:Math.floor(Math.random()*100)+50,
owned:0,
unlocked:s.unlockCost===0,
history:[],
lockedShares:0
}));

stocks.forEach(s=>s.history.push(s.price));

const newsList=[
{text:"好景気",effect:20},
{text:"暴落",effect:-20},
{text:"技術革新",effect:15},
{text:"金融不安",effect:-15},
{text:"安定相場",effect:0}
];

function renderStocks(){
const area=document.getElementById("stocksArea");
area.innerHTML="";
stocks.forEach((s,i)=>{
area.innerHTML+=`
<div class="card">
<b>${s.name}</b><br>
価格: ${s.price}<br>
保有: ${s.owned}<br>
<button onclick="trade(${i},1)">1株買</button>
<button onclick="trade(${i},10)">10株買</button>
<button onclick="trade(${i},100)">100株買</button><br>
<button onclick="trade(${i},-1)">1株売</button>
<button onclick="trade(${i},-10)">10株売</button>
<button onclick="trade(${i},-100)">100株売</button>
<div class="flavor">${s.flavor}</div>
</div>`;
});
}

function trade(i,amount){
let s=stocks[i];
if(amount>0){
let cost=s.price*amount;
if(points>=cost){
points-=cost;
s.owned+=amount;
s.lockedShares+=amount;
}
}else{
let sell=Math.abs(amount);
let sellable=s.owned-s.lockedShares;
if(sell>sellable){
alert("この変動中に買った株は売れません");
return;
}
points+=s.price*sell;
s.owned-=sell;
}
updateDisplay();
renderStocks();
}

function marketUpdate(){
const news=newsList[Math.floor(Math.random()*newsList.length)];
document.getElementById("news").innerText=news.text;
stocks.forEach(s=>{
let change;
switch(s.personality){
case "stable":change=Math.floor(Math.random()*5)-2;break;
case "volatile":change=Math.floor(Math.random()*21)-10;break;
case "growth":change=Math.floor(Math.random()*8)+1;break;
case "risky":change=Math.floor(Math.random()*31)-15;break;
}
s.price+=change+news.effect;
if(s.price<10)s.price=10;
s.history.push(s.price);
s.lockedShares=0;
});
updateChart();
}

function startTimer(){
nextChangeTime=Date.now()+CHANGE_INTERVAL;
setInterval(()=>{
let now=Date.now();
if(now>=nextChangeTime){
marketUpdate();
nextChangeTime=now+CHANGE_INTERVAL;
}
let remain=nextChangeTime-now;
let m=Math.floor(remain/60000);
let s=Math.floor((remain%60000)/1000);
document.getElementById("timer").innerText=m+"分 "+s+"秒";
},1000);
}

function updateDisplay(){
document.getElementById("points").innerText=points;
}

function createChart(){
const ctx=document.getElementById("chart").getContext("2d");
chart=new Chart(ctx,{
type:"line",
data:{
labels:stocks[0].history.map((_,i)=>i),
datasets:stocks.map(s=>({
label:s.name,
data:s.history,
borderColor:"#00f5ff",
tension:0.3
}))
},
options:{responsive:true}
});
}

function updateChart(){
chart.data.labels=stocks[0].history.map((_,i)=>i);
chart.data.datasets=stocks.map(s=>({
label:s.name,
data:s.history,
borderColor:"#00f5ff",
tension:0.3
}));
chart.update();
}

/* 粒子 */
const canvasP=document.getElementById("particles");
const ctxP=canvasP.getContext("2d");
canvasP.width=window.innerWidth;
canvasP.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvasP.width,
y:Math.random()*canvasP.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5
});
}

function animateParticles(){
ctxP.clearRect(0,0,canvasP.width,canvasP.height);
particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvasP.width)p.dx*=-1;
if(p.y<0||p.y>canvasP.height)p.dy*=-1;
ctxP.beginPath();
ctxP.arc(p.x,p.y,p.r,0,Math.PI*2);
ctxP.fillStyle="#00f5ff";
ctxP.shadowBlur=10;
ctxP.shadowColor="#00f5ff";
ctxP.fill();
});
requestAnimationFrame(animateParticles);
}
animateParticles();

function toggleBGM(){
const bgm=document.getElementById("bgm");
if(bgm.paused){bgm.play();}
else{bgm.pause();}
}

renderStocks();
updateDisplay();
createChart();
startTimer();
</script>

</body>
</html>
